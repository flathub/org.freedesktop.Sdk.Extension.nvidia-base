id: org.freedesktop.Sdk.Extension.nvidia-base
runtime: org.freedesktop.Sdk
runtime-version: '24.08'
build-extension: true
sdk: org.freedesktop.Sdk
separate-locales: false

build-options:
  prefix: /usr/lib/sdk/nvidia-base

cleanup:
  - /bin
  - /include
  - /lib/pkgconfig
  - /share

modules:
  - name: zlib
    config-opts:
      - --static
    sources:
      - type: archive
        url: https://github.com/madler/zlib/releases/download/v1.3.1/zlib-1.3.1.tar.xz
        sha256: 38ef96b8dfe510d42707d9c781877914792541133e1870841463bfa73f883e32
        x-checker-data:
          type: anitya
          project-id: 5303
          stable-only: true
          url-template: https://github.com/madler/zlib/releases/download/v$version/zlib-$version.tar.xz

  - name: liblzma
    config-opts:
      - --disable-encoders
      - --enable-decoders=lzma1,lzma2
      - --disable-microlzma
      - --disable-lzip-decoder
      - --disable-xz
      - --disable-xzdec
      - --disable-lzmadec
      - --disable-lzmainfo
      - --disable-lzma-links
      - --disable-scripts
      - --disable-doc
      - --disable-dependency-tracking
      - --disable-shared
    sources:
      - type: archive
        url: https://github.com/tukaani-project/xz/releases/download/v5.8.1/xz-5.8.1.tar.xz
        sha256: 0b54f79df85912504de0b14aec7971e3f964491af1812d83447005807513cd9e
        x-checker-data:
          type: anitya
          project-id: 5277
          stable-only: true
          url-template: https://github.com/tukaani-project/xz/releases/download/v$version/xz-$version.tar.xz

  - name: libzstd
    subdir: lib
    buildsystem: simple
    build-options:
      cppflags: -DZSTD_MULTITHREAD
    build-commands:
      - make -j ${FLATPAK_BUILDER_N_JOBS} PREFIX=${FLATPAK_DEST} install-static
    sources:
      - type: archive
        url: https://github.com/facebook/zstd/releases/download/v1.5.7/zstd-1.5.7.tar.zst
        sha256: 5b331d961d6989dc21bb03397fc7a2a4d86bc65a14adc5ffbbce050354e30fd2
        x-checker-data:
          type: anitya
          project-id: 12083
          stable-only: true
          url-template: https://github.com/facebook/zstd/releases/download/v$version/zstd-$version.tar.zst

  - name: libarchive
    config-opts:
      - --disable-dependency-tracking
      - --disable-shared
      - --enable-static
      - --disable-xattr
      - --disable-acl
      - --without-bz2lib
      - --without-iconv
      - --without-lz4
      - --without-lzo2
      - --without-nettle
      - --without-openssl
      - --without-xml2
      - --without-expat
      - --disable-bsdcat
      - --disable-bsdcpio
      - --disable-bsdtar
      - --disable-bsdunzip
      - --without-libb2
      - --without-cng
      - --without-mbedtls
    sources:
      - type: archive
        url: https://github.com/libarchive/libarchive/releases/download/v3.8.0/libarchive-3.8.0.tar.xz
        sha256: 67bfac3798a778143f4b1cadcdb3792b4269486f8e1b70ca5c0ee5841398bfdf
        x-checker-data:
          type: anitya
          project-id: 1558
          stable-only: true
          url-template: https://github.com/libarchive/libarchive/releases/download/v$version/libarchive-$version.tar.xz
